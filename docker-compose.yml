version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# KEY CONCEPT: "services" are the containers that make up the application.
# Docker Compose starts them all with a single command and lets them talk to
# each other by service name (e.g. the app reaches the DB at host "db").
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. Database service ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine          # Official PostgreSQL image (no build needed)
    container_name: demo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       letsMoveDB          # Database name created automatically
      POSTGRES_USER:     postgres      # Superuser name
      POSTGRES_PASSWORD: ${PASSWORD_DB}      # Superuser password (never do this in production!)
    ports:
      - "5432:5432"                    # host_port:container_port  →  accessible from your machine
    volumes:
      # Persist database data across container restarts
      - db_data:/var/lib/postgresql/data
      # Initialisation scripts: any .sql file here runs once on first startup
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

# ─────────────────────────────────────────────────────────────────────────────
# Volumes: named volumes are managed by Docker and survive container removal.
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  db_data: